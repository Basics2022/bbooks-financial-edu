<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Portfolio Theory - Chart.js Interactive Layered Frontiers</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #f8f9fa; 
            font-family: system-ui, -apple-system, sans-serif; 
            user-select: none;
            overflow: hidden; 
        }
        .container { 
            width: 100%; 
            height: 100%; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 10px 15px; 
            display: flex; 
            flex-direction: column; 
        }
        h2 { margin: 0 0 6px 0; font-size: 1.25em; color: #212529; flex-shrink: 0; }
        
        .slider-box { 
            background: #e9ecef; 
            padding: 6px 12px; 
            border-radius: 6px; 
            margin-bottom: 6px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            flex-shrink: 0; 
        }
        input[type=range] { flex-grow: 1; cursor: pointer; }
        .val-display { font-family: monospace; font-size: 1em; background: white; padding: 2px 6px; border-radius: 4px; border: 1px solid #ccc; min-width: 55px; text-align: center; }
        
        .workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0; 
        }
        .case-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0; 
        }
        .case-title { 
            font-size: 0.95em; 
            font-weight: bold; 
            color: #495057; 
            border-bottom: 2px solid #dee2e6; 
            padding-bottom: 2px; 
            margin-bottom: 4px; 
            flex-shrink: 0;
        }
        .plot-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            flex-grow: 1;
            min-height: 0; 
            min-width: 0;
        }
        .plot-container { 
            background: #fff; 
            border: 1px solid #dee2e6; 
            border-radius: 6px; 
            padding: 4px; 
            position: relative; 
            height: 100%;
            width: 100%;
            min-height: 0;
            min-width: 0;
        }
        .plot-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-G9JVM265TS"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-G9JVM265TS');
</script>

<body>

<div class="container">
    <h2>Modern Portfolio Theory: Effect of Correlation & Asset Dynamics</h2>
    
    <div class="slider-box">
        <label style="font-weight:bold; font-size: 0.9em;">Active Correlation (&rho;<sub>12</sub>):</label>
        <input type="range" id="corr-slider" min="-1" max="1" step="0.05" value="0.00">
        <span id="corr-val" class="val-display">0.00</span>
    </div>

    <div class="workspace">
        <div class="case-section">
            <div class="case-title">Case 1: Two Risky Assets Portfolio <span style="font-weight: normal; font-size: 0.85em; color: #6c757d;">(Drag Blue/Orange dots to reshape)</span></div>
            <div class="plot-row">
                <div class="plot-container"><canvas id="canvas1-frontier"></canvas></div>
                <div class="plot-container"><canvas id="canvas1-weights"></canvas></div>
            </div>
        </div>

        <div class="case-section">
            <div class="case-title">Case 2: Three Assets Portfolio <span style="font-weight: normal; font-size: 0.85em; color: #6c757d;">(Drag Green dot vertically to change Rf)</span></div>
            <div class="plot-row">
                <div class="plot-container"><canvas id="canvas2-frontier"></canvas></div>
                <div class="plot-container"><canvas id="canvas2-weights"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
let mu1 = 5.0,  si1 = 6.0;
let mu2 = 10.0, si2 = 15.0;
let mu3 = 3.0,  si3 = 0.0; 

const n_des_return = 50; 
const n_corr = 9;

const des_returns = [];
for(let i=0; i<n_des_return; i++) { des_returns.push(1.0 + (11.0 / (n_des_return - 1)) * i); }

const corr_slices = [];
for(let i=0; i<n_corr; i++) { corr_slices.push(-1.0 + (2.0 / (n_corr - 1)) * i); }

let isDragging = false;
let draggedAssetIdx = null; 
let activeDragChart = null;  
let activeDragCanvas = null;

function solveLinearSystem(A, b) {
    let n = b.length;
    let M = new Array(n);
    for (let i = 0; i < n; i++) { M[i] = [...A[i], b[i]]; }

    for (let i = 0; i < n; i++) {
        let maxEl = Math.abs(M[i][i]), maxRow = i;
        for (let k = i + 1; k < n; k++) {
            if (Math.abs(M[k][i]) > maxEl) { maxEl = Math.abs(M[k][i]); maxRow = k; }
        }
        let tmp = M[maxRow]; M[maxRow] = M[i]; M[i] = tmp;

        if (Math.abs(M[i][i]) < 1e-12) { M[i][i] = M[i][i] < 0 ? -1e-12 : 1e-12; }

        for (let k = i + 1; k < n; k++) {
            let c = -M[k][i] / M[i][i];
            for (let j = i; j <= n; j++) {
                if (i === j) { M[k][j] = 0; } else { M[k][j] += c * M[i][j]; }
            }
        }
    }

    let x = new Array(n).fill(0);
    for (let i = n - 1; i >= 0; i--) {
        x[i] = M[i][n] / M[i][i];
        for (let k = i - 1; k >= 0; k--) { M[k][n] -= M[k][i] * x[i]; }
    }
    return x;
}

function computeFrontierWeights(mu_vec, rho, target_r, isThreeAsset) {
    let n = isThreeAsset ? 3 : 2;
    let cov = (n === 2) ? [
        [si1*si1, si1*si2*rho],
        [si1*si2*rho, si2*si2]
    ] : [
        [si1*si1, si1*si2*rho, 0.0],
        [si1*si2*rho, si2*si2, 0.0],
        [0.0, 0.0, si3*si3]
    ];

    let sysDim = n + 2;
    let A = Array.from({length: sysDim}, () => new Array(sysDim).fill(0));
    let b = new Array(sysDim).fill(0);

    for(let i=0; i<n; i++) {
        for(let j=0; j<n; j++) { A[i][j] = cov[i][j]; }
        A[i][n]   = -mu_vec[i];
        A[i][n+1] = -1.0;
        A[n][i]   = -mu_vec[i];
        A[n+1][i] = -1.0;
    }
    b[n]   = -target_r;
    b[n+1] = -1.0;

    let solution = solveLinearSystem(A, b);
    let weights = solution.slice(0, n);

    let variance = 0;
    for(let i=0; i<n; i++) {
        for(let j=0; j<n; j++) { variance += weights[i] * cov[i][j] * weights[j]; }
    }
    return { w: weights, sigma: Math.sqrt(Math.max(0, variance)) };
}

function generateCurve(rho, isThreeAsset) {
    let mu_vec = isThreeAsset ? [mu1, mu2, mu3] : [mu1, mu2];
    let x_vals = [], y_vals = [], w0_vals = [], w1_vals = [], w2_vals = [];
    
    for(let r of des_returns) {
        let res = computeFrontierWeights(mu_vec, rho, r, isThreeAsset);
        x_vals.push(res.sigma);
        y_vals.push(r);
        w0_vals.push(res.w[0]);
        w1_vals.push(res.w[1]);
        if(isThreeAsset) w2_vals.push(res.w[2]);
    }
    return { x: x_vals, y: y_vals, w0: w0_vals, w1: w1_vals, w2: w2_vals };
}

let chart1_f, chart1_w, chart2_f, chart2_w;

function initCharts() {
    const optFrontier = {
        responsive: true, maintainAspectRatio: false,
        animation: false,
        scales: { 
            x: { type: 'linear', title: { display: true, text: 'Volatility (Std Deviation)' }, min: -1, max: 21 }, 
            y: { type: 'linear', title: { display: true, text: 'Expected Return' }, min: 0, max: 12 } 
        },
        plugins: { legend: { display: false } },
        onHover: (e, el) => {
            e.native.target.style.cursor = (el.length && el[0].datasetIndex >= n_corr) ? 'grab' : 'default';
        }
    };

    const optWeights = {
        responsive: true, maintainAspectRatio: false,
        animation: false,
        scales: { 
            x: { type: 'linear', title: { display: true, text: 'Portfolio Weight' }, min: -1.5, max: 2.5 }, 
            y: { type: 'linear', title: { display: true, text: 'Expected Return' }, min: 0, max: 12 } 
        },
        plugins: { legend: { display: false } }
    };

    // --- CASE 1: FRONTIER ---
    let datasets1_f = [];
    corr_slices.forEach((rho, idx) => {
        // order: 10 keeps background lines deep down
        datasets1_f.push({ id: `bg_f1_${idx}`, data: [], showLine: true, borderColor: 'rgb(220,220,220)', borderWidth: 1, pointRadius: 0, order: 10 });
    });
    datasets1_f.push({ label: 'Selected active frontier', data: [], showLine: true, borderColor: '#000000', borderWidth: 3.5, pointRadius: 0, order: 2 });
    // order: 0 forces asset nodes to be rendered dead last (on top of everything)
    datasets1_f.push({ label: 'Asset 0', data: [], pointRadius: 7, pointHoverRadius: 9, pointBackgroundColor: '#1f77b4', borderColor: '#1f77b4', order: 0 });
    datasets1_f.push({ label: 'Asset 1', data: [], pointRadius: 7, pointHoverRadius: 9, pointBackgroundColor: '#ff7f0e', borderColor: '#ff7f0e', order: 0 });

    chart1_f = new Chart(document.getElementById('canvas1-frontier'), { type: 'scatter', data: { datasets: datasets1_f }, options: optFrontier });

    // --- CASE 1: WEIGHTS ---
    let datasets1_w = [];
    corr_slices.forEach((rho, idx) => {
        datasets1_w.push({ id: `bg_w1_0_${idx}`, data: [], showLine: true, borderColor: 'rgba(31, 119, 180, 0.11)', borderWidth: 1, pointRadius: 0, order: 10 });
        datasets1_w.push({ id: `bg_w1_1_${idx}`, data: [], showLine: true, borderColor: 'rgba(255, 127, 14, 0.11)', borderWidth: 1, pointRadius: 0, order: 10 });
    });
    datasets1_w.push({ label: 'Asset 0 (Weight)', data: [], showLine: true, borderColor: '#1f77b4', borderWidth: 3, pointRadius: 0, order: 1 });
    datasets1_w.push({ label: 'Asset 1 (Weight)', data: [], showLine: true, borderColor: '#ff7f0e', borderWidth: 3, pointRadius: 0, order: 1 });

    chart1_w = new Chart(document.getElementById('canvas1-weights'), { type: 'scatter', data: { datasets: datasets1_w }, options: optWeights });

    // --- CASE 2: FRONTIER ---
    let datasets2_f = [];
    corr_slices.forEach((rho, idx) => {
        datasets2_f.push({ id: `bg_f2_${idx}`, data: [], showLine: true, borderColor: 'rgb(220,220,220)', borderWidth: 1, pointRadius: 0, order: 10 });
    });
    datasets2_f.push({ data: [], showLine: true, borderColor: '#000000', borderWidth: 3.5, pointRadius: 0, order: 2 });
    datasets2_f.push({ label: 'Asset 0', data: [], pointRadius: 7, pointHoverRadius: 9, pointBackgroundColor: '#1f77b4', borderColor: '#1f77b4', order: 0 });
    datasets2_f.push({ label: 'Asset 1', data: [], pointRadius: 7, pointHoverRadius: 9, pointBackgroundColor: '#ff7f0e', borderColor: '#ff7f0e', order: 0 });
    datasets2_f.push({ label: 'Asset 2', data: [], pointRadius: 7, pointHoverRadius: 9, pointStyle: 'rect', pointBackgroundColor: '#2ca02c', borderColor: '#2ca02c', order: 0 });

    chart2_f = new Chart(document.getElementById('canvas2-frontier'), { type: 'scatter', data: { datasets: datasets2_f }, options: optFrontier });

    // --- CASE 2: WEIGHTS ---
    let datasets2_w = [];
    corr_slices.forEach((rho, idx) => {
        datasets2_w.push({ id: `bg_w2_0_${idx}`, data: [], showLine: true, borderColor: 'rgba(31, 119, 180, 0.11)', borderWidth: 1, pointRadius: 0, order: 10 });
        datasets2_w.push({ id: `bg_w2_1_${idx}`, data: [], showLine: true, borderColor: 'rgba(255, 127, 14, 0.11)', borderWidth: 1, pointRadius: 0, order: 10 });
        datasets2_w.push({ id: `bg_w2_2_${idx}`, data: [], showLine: true, borderColor: 'rgba(44, 160, 44, 0.11)', borderWidth: 1, pointRadius: 0, order: 10 });
    });
    datasets2_w.push({ label: 'Asset 0 (Weight)', data: [], showLine: true, borderColor: '#1f77b4', borderWidth: 3, pointRadius: 0, order: 1 });
    datasets2_w.push({ label: 'Asset 1 (Weight)', data: [], showLine: true, borderColor: '#ff7f0e', borderWidth: 3, pointRadius: 0, order: 1 });
    datasets2_w.push({ label: 'Asset 2 (RF Weight)', data: [], showLine: true, borderColor: '#2ca02c', borderWidth: 3, pointRadius: 0, order: 1 });

    chart2_w = new Chart(document.getElementById('canvas2-weights'), { type: 'scatter', data: { datasets: datasets2_w }, options: optWeights });

    setupInteractions();
    calculateStaticBackgrounds();
    updatePlots(0.00);
}

function calculateStaticBackgrounds() {
    corr_slices.forEach((rho, idx) => {
        let curve1 = generateCurve(rho, false);
        chart1_f.data.datasets[idx].data = curve1.x.map((x, i) => ({x: x, y: curve1.y[i]}));
        
        let wIdx1 = idx * 2;
        chart1_w.data.datasets[wIdx1].data = curve1.w0.map((w, i) => ({x: w, y: des_returns[i]}));
        chart1_w.data.datasets[wIdx1 + 1].data = curve1.w1.map((w, i) => ({x: w, y: des_returns[i]}));

        let curve2 = generateCurve(rho, true);
        chart2_f.data.datasets[idx].data = curve2.x.map((x, i) => ({x: x, y: curve2.y[i]}));

        let wIdx2 = idx * 3;
        chart2_w.data.datasets[wIdx2].data = curve2.w0.map((w, i) => ({x: w, y: des_returns[i]}));
        chart2_w.data.datasets[wIdx2 + 1].data = curve2.w1.map((w, i) => ({x: w, y: des_returns[i]}));
        chart2_w.data.datasets[wIdx2 + 2].data = curve2.w2.map((w, i) => ({x: w, y: des_returns[i]}));
    });
}

function updatePlots(targetCorr) {
    let active1 = generateCurve(targetCorr, false);
    let active2 = generateCurve(targetCorr, true);

    chart1_f.data.datasets[n_corr + 1].data = [{x: si1, y: mu1}];
    chart1_f.data.datasets[n_corr + 2].data = [{x: si2, y: mu2}];
    chart2_f.data.datasets[n_corr + 1].data = [{x: si1, y: mu1}];
    chart2_f.data.datasets[n_corr + 2].data = [{x: si2, y: mu2}];
    chart2_f.data.datasets[n_corr + 3].data = [{x: si3, y: mu3}];

    chart1_f.data.datasets[n_corr].data = active1.x.map((x, i) => ({x: x, y: active1.y[i]}));
    chart1_f.update('none');

    chart2_f.data.datasets[n_corr].data = active2.x.map((x, i) => ({x: x, y: active2.y[i]}));
    chart2_f.update('none');

    let len1 = chart1_w.data.datasets.length;
    chart1_w.data.datasets[len1 - 2].data = active1.w0.map((w, i) => ({x: w, y: des_returns[i]}));
    chart1_w.data.datasets[len1 - 1].data = active1.w1.map((w, i) => ({x: w, y: des_returns[i]}));
    chart1_w.update('none');

    let len2 = chart2_w.data.datasets.length;
    chart2_w.data.datasets[len2 - 3].data = active2.w0.map((w, i) => ({x: w, y: des_returns[i]}));
    chart2_w.data.datasets[len2 - 2].data = active2.w1.map((w, i) => ({x: w, y: des_returns[i]}));
    chart2_w.data.datasets[len2 - 1].data = active2.w2.map((w, i) => ({x: w, y: des_returns[i]}));
    chart2_w.update('none');
}

function setupInteractions() {
    [
        { chart: chart1_f, id: 'canvas1-frontier' },
        { chart: chart2_f, id: 'canvas2-frontier' }
    ].forEach(({ chart, id }) => {
        const canvas = document.getElementById(id);

        const processStart = (e, clientX, clientY) => {
            const simulatedEvent = {
                clientX: clientX,
                clientY: clientY,
                type: 'click',
                target: canvas
            };
            const points = chart.getElementsAtEventForMode(simulatedEvent, 'nearest', { intersect: true }, true);
            
            if (points.length > 0) {
                let dsIdx = points[0].datasetIndex;
                if (dsIdx > n_corr) {
                    isDragging = true;
                    canvas.style.cursor = 'grabbing';
                    draggedAssetIdx = dsIdx - (n_corr + 1); 
                    activeDragChart = chart;      
                    activeDragCanvas = canvas;    
                    return true;
                }
            }
            return false;
        };

        canvas.addEventListener('mousedown', (e) => {
            processStart(e, e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                if(processStart(e, e.touches[0].clientX, e.touches[0].clientY)) {
                    if(e.cancelable) e.preventDefault();
                }
            }
        }, { passive: false });
    });

    const processMove = (e, clientX, clientY) => {
        if (!isDragging || !activeDragChart || !activeDragCanvas) return;

        const rect = activeDragCanvas.getBoundingClientRect();
        const mouseX = clientX - rect.left;
        const mouseY = clientY - rect.top;

        const xVal = activeDragChart.scales.x.getValueForPixel(mouseX);
        const yVal = activeDragChart.scales.y.getValueForPixel(mouseY);

        if (draggedAssetIdx === 0) {
            si1 = Math.max(0.5, Math.min(20, xVal));
            mu1 = Math.max(0.5, Math.min(11.5, yVal));
        } else if (draggedAssetIdx === 1) {
            si2 = Math.max(0.5, Math.min(20, xVal));
            mu2 = Math.max(0.5, Math.min(11.5, yVal));
        } else if (draggedAssetIdx === 2) {
            mu3 = Math.max(0.5, Math.min(11.5, yVal));
        }

        calculateStaticBackgrounds();
        updatePlots(parseFloat(document.getElementById('corr-slider').value));
    };

    window.addEventListener('mousemove', (e) => {
        processMove(e, e.clientX, e.clientY);
    });

    window.addEventListener('touchmove', (e) => {
        if (isDragging && e.touches.length > 0) {
            processMove(e, e.touches[0].clientX, e.touches[0].clientY);
            if(e.cancelable) e.preventDefault(); 
        }
    }, { passive: false });

    const processEnd = () => {
        if (isDragging) {
            isDragging = false;
            draggedAssetIdx = null;
            activeDragChart = null;
            if (activeDragCanvas) activeDragCanvas.style.cursor = 'default';
            activeDragCanvas = null;
        }
    };

    window.addEventListener('mouseup', processEnd);
    window.addEventListener('touchend', processEnd);
    window.addEventListener('touchcancel', processEnd);
}

document.getElementById('corr-slider').addEventListener('input', (e) => {
    let val = parseFloat(e.target.value);
    document.getElementById('corr-val').innerText = val.toFixed(2);
    updatePlots(val);
});

window.onload = initCharts;
</script>
</body>
</html>
